name: Update Champion Roles

on:
  schedule:
    - cron: '0 * * * *'   # hourly - cheap once the dataset is complete, since the script exits fast
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-champion-roles
  cancel-in-progress: false # means an in-progress run will finish and just queue the next run

jobs:
  update-champion-roles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update champion roles
        run: node scripts/update-champion-roles.js
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}

      - name: Commit updated champion role data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          git add role-frequency-table.json update-log.txt
          if [ -f champion-roles.json ]; then git add champion-roles.json; fi
          git diff --cached --quiet || git commit -m "Update champion role stats"
          git pull --rebase
          git push
